# Tiny Tapeout project information
project:
  title: "AES-128 2-round unrolled accelerator"
  author: "Zhong Shengwen / ECE5063 group"
  discord: ""
  description: "AES-128 encryption accelerator using a partially unrolled 2-round architecture and a byte-serial Tiny Tapeout wrapper."
  language: "Verilog"
  clock_hz: 50000000
  tiles: "12x2"
  top_module: "tt_um_zswertttyui_aes_unroll2"
  source_files:
    - "project.v"
    - "aes_top_unroll2.v"
    - "aes_core_unroll2.v"
    - "aes_key_expand.v"
    - "aes_round_normal.v"
    - "aes_round_final.v"
    - "aes_subbytes.v"
    - "aes_sbox.v"
    - "aes_shiftrows.v"
    - "aes_mixcolumns.v"
    - "aes_mixcolumns_one_column.v"

pinout:
  # Inputs: byte-serial AES data input
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  # Outputs: selected ciphertext byte
  uo[0]: "cipher_byte[0]"
  uo[1]: "cipher_byte[1]"
  uo[2]: "cipher_byte[2]"
  uo[3]: "cipher_byte[3]"
  uo[4]: "cipher_byte[4]"
  uo[5]: "cipher_byte[5]"
  uo[6]: "cipher_byte[6]"
  uo[7]: "cipher_byte[7]"

  # Bidirectional pins: lower four are input controls, upper four are output status
  uio[0]: "load_key_byte"
  uio[1]: "load_plaintext_byte"
  uio[2]: "start"
  uio[3]: "read_next_cipher_byte"
  uio[4]: "busy"
  uio[5]: "done"
  uio[6]: "key_ready"
  uio[7]: "plaintext_ready"

yaml_version: 6

